# CI — suite offline en cada push/PR.
# Los tests backend son 100% offline (tests/conftest.py fuerza env vacío de Azure
# y sqlite); las suites live (RUN_*_LIVE=1) y el eval harness quedan fuera —
# spec 5.3 §5 añadirá el gate de eval como workflow_dispatch cuando haya Azure.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      # WeasyPrint necesita Pango en runtime (los tests de export PDF se saltan
      # sin él — instalarlo hace que la aceptación 5.6 corra también en CI).
      # unixodbc: lib runtime por si la wheel de pyodbc la enlaza.
      - name: Install native libs (Pango for WeasyPrint, unixODBC)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 unixodbc unixodbc-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      # pytest/pytest-asyncio son deps de desarrollo, fuera de requirements.txt (runtime)
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Run test suite
        run: python -m pytest tests -q

  frontend:
    name: Frontend (vitest + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run smoke tests
        run: pnpm test

      # build = tsc --noEmit && vite build → cubre también el typecheck estricto
      - name: Typecheck + production build
        run: pnpm build
